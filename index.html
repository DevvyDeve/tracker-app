<!DOCTYPE html>
<html>

<head>
<title>Work Tracker</title>

<style>

html, body{
  height:100%;
  margin:0;
  overflow:hidden;
}

body{
  font-family: 'Segoe UI', Arial;
  background:#f4f6f9;
  display:flex;
  justify-content:center;
  align-items:center;
}

.container{
  background:white;
  padding:30px;
  border-radius:16px;
  width:380px;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
  text-align:center;
}

h1{
  margin-bottom:10px;
}

.info{
  margin:6px 0;
  font-size:14px;
  color:#666;
}

#timer{
  font-size:42px;
  margin:20px 0;
  font-weight:bold;
  letter-spacing:2px;
}

.bar{
  width:100%;
  height:18px;
  background:#eee;
  border-radius:20px;
  overflow:hidden;
  margin-bottom:15px;
}

.fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#4caf50,#81c784);
  transition: width 0.5s ease;
}

button{
  padding:12px 15px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  transition:0.2s;
}

button:hover{
  transform:scale(1.05);
}

button:active{
  transform:scale(0.85);
}

.start{ background:#4caf50; color:white; }
.pause{ background:#ff9800; color:white; }
.end{ background:#f44336; color:white; }
.logout{ background:#555; color:white; }

</style>

</head>

<body>
    <div class="container">

<h1>Work Tracker</h1>
<div id="user" class="info">User: -</div>
<div id="status" class="info">Status: ACTIVE</div>
<div id="timer">00:00:00</div>
<div id="app" class="info">App: -</div>
<button id="toggleBtn" class="start" onclick="toggleWork()">Start</button>
<button class="logout" onclick="endWork()">Logout</button>

<div id="idleModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; justify-content:center; align-items:center;">
  <div style="background:#fff; padding:30px; border-radius:10px; text-align:center;">
    <h2>⚠️ Tracker Paused</h2>
    <p>You are idle. Tracking paused.</p>
    <button onclick="resumeTracking()">OK</button>
  </div>
</div>

<script>
const ipc = window.api;
let currentUser = null;
let timer;
let seconds = 0;
let userKey = null;
let tracking = false;

function format(n){
  return n.toString().padStart(2,"0");
}


function toggleWork(){

  const btn = document.getElementById("toggleBtn");

  if(!tracking){

    tracking = true;
    ipc.send("start-tracking");
    btn.innerText = "Pause";

    timer = setInterval(()=>{

      seconds++;
      if(userKey){
        localStorage.setItem(userKey, seconds);
      }

      let hrs = Math.floor(seconds/3600);
      let mins = Math.floor((seconds%3600)/60);
      let secs = seconds%60;

      document.getElementById("timer").innerText =
      `${format(hrs)}:${format(mins)}:${format(secs)}`;


    },1000);


  }else{

    tracking = false;
    btn.innerText = "Start";
    ipc.send("stop-tracking");
    clearInterval(timer);

  }

}

function endWork(){
  tracking = false;
  clearInterval(timer);
  ipc.send("logout"); 
  alert("Logged out");
}


ipc.on("status-update",(event,status)=>{

  const statusEl = document.getElementById("status");
  const btn = document.getElementById("toggleBtn");

  statusEl.innerText = "Status: " + status.toUpperCase();

  if(status === "active"){

    statusEl.style.color = "#4caf50";

    btn.innerText = "Pause";
    tracking = true;

  }else{

    statusEl.style.color = "#f44336";

    // 🔥 STOP TIMER
    if(timer){
      clearInterval(timer);
      timer = null;
    }

    tracking = false;
    btn.innerText = "Start";
  }

});

ipc.on("force-stop", ()=>{

  if(timer){
    clearInterval(timer);
    timer = null;
  }

  tracking = false;

  const btn = document.getElementById("toggleBtn");
  btn.innerText = "Start";

});

ipc.on("app-update",(event,data)=>{
  document.getElementById("app").innerText =
  "App: " + data.app + " | " + data.title;
});

function updateTimerDisplay(){
  let hrs = Math.floor(seconds/3600);
  let mins = Math.floor((seconds%3600)/60);
  let secs = seconds%60;

  document.getElementById("timer").innerText =
  `${format(hrs)}:${format(mins)}:${format(secs)}`;
}

ipc.on("user-data",(event,data)=>{

  const today = new Date().toDateString();

  const savedDateKey = "date_" + data.userId;
  const savedDate = localStorage.getItem(savedDateKey);

  userKey = "seconds_" + data.userId;

  // 👉 CHECK IF NEW DAY
  if(savedDate !== today){
    seconds = 0;
    localStorage.setItem(userKey, 0);
    localStorage.setItem(savedDateKey, today);
  }else{
    seconds = parseInt(localStorage.getItem(userKey)) || 0;
  }

  document.getElementById("user").innerText =
  "User: " + data.userId;

  updateTimerDisplay();
});

window.api.receive("idle-popup", ()=>{
  document.getElementById("idleModal").style.display = "flex";
});

window.api.receive("resume-tracking", ()=>{

  document.getElementById("idleModal").style.display = "none";

  console.log("🔥 RESUME TRACKING TRIGGERED");

  // 👉 ALWAYS clear timer first (important)
  if(timer){
    clearInterval(timer);
  }

  tracking = true;

  const btn = document.getElementById("toggleBtn");
  btn.innerText = "Pause";

  // 👉 FORCE START TIMER
  timer = setInterval(()=>{
    seconds++;

    if(userKey){
      localStorage.setItem(userKey, seconds);
    }

    let hrs = Math.floor(seconds/3600);
    let mins = Math.floor((seconds%3600)/60);
    let secs = seconds%60;

    document.getElementById("timer").innerText =
    `${format(hrs)}:${format(mins)}:${format(secs)}`;

  },1000);

});

function resumeTracking(){
if(timer){
  clearInterval(timer);
}
  tracking = true;

  const btn = document.getElementById("toggleBtn");
  btn.innerText = "Pause";

  timer = setInterval(()=>{
    seconds++;

    if(userKey){
      localStorage.setItem(userKey, seconds);
    }

    let hrs = Math.floor(seconds/3600);
    let mins = Math.floor((seconds%3600)/60);
    let secs = seconds%60;

    document.getElementById("timer").innerText =
    `${format(hrs)}:${format(mins)}:${format(secs)}`;

  },1000);

  window.api.send("start-tracking");

  document.getElementById("idleModal").style.display = "none";
}

let lastSent = 0;

window.addEventListener("mousemove", ()=>{
  const now = Date.now();

  if(now - lastSent > 500){ // limit spam
    window.api.send("user-activity");
    window.api.send("increment-activity");
    lastSent = now;
  }
});

window.addEventListener("keydown", ()=>{
  window.api.send("user-activity");
  window.api.send("increment-activity");
});

ipc.on("trigger-screenshot", ()=>{
  window.api.send("trigger-screenshot");
});

</script>
</div>
</body>

</html>
