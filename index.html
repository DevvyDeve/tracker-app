<!DOCTYPE html>
<html>

<head>
<title>Work Tracker</title>

<style>

html, body{
  height:100%;
  margin:0;
  overflow:hidden;
}

body{
  font-family: 'Segoe UI', Arial;
  background:#f4f6f9;
  display:flex;
  justify-content:center;
  align-items:center;
}

.container{
  background:white;
  padding:30px;
  border-radius:16px;
  width:380px;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
  text-align:center;
}

h1{
  margin-bottom:10px;
}

.info{
  margin:6px 0;
  font-size:14px;
  color:#666;
}

#timer{
  font-size:42px;
  margin:20px 0;
  font-weight:bold;
  letter-spacing:2px;
}

.bar{
  width:100%;
  height:18px;
  background:#eee;
  border-radius:20px;
  overflow:hidden;
  margin-bottom:15px;
}

.fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#4caf50,#81c784);
  transition: width 0.5s ease;
}

button{
  padding:12px 15px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  transition:0.2s;
}

button:hover{
  transform:scale(1.05);
}

button:active{
  transform:scale(0.85);
}

.start{ background:#4caf50; color:white; }
.pause{ background:#ff9800; color:white; }
.end{ background:#f44336; color:white; }
.logout{ background:#555; color:white; }

</style>

</head>

<body>
    <div class="container">

<h1>Work Tracker</h1>
<div id="user" class="info">User: -</div>
<div id="status" class="info">Status: ACTIVE</div>
<div id="timer">00:00:00</div>
<div id="app" class="info">App: -</div>
<button id="toggleBtn" class="start" onclick="toggleWork()">Start</button>
<button class="end" onclick="endWork()">End Session</button>

<script>
const ipc = window.api;
let currentUser = null;
let timer;
let seconds = 0;
let userKey = null;
let tracking = false;

function format(n){
  return n.toString().padStart(2,"0");
}


function toggleWork(){

  const btn = document.getElementById("toggleBtn");

  if(!tracking){

    tracking = true;
    btn.innerText = "Pause";

    timer = setInterval(()=>{

      seconds++;
      if(userKey){
        localStorage.setItem(userKey, seconds);
      }

      let hrs = Math.floor(seconds/3600);
      let mins = Math.floor((seconds%3600)/60);
      let secs = seconds%60;

      document.getElementById("timer").innerText =
      `${format(hrs)}:${format(mins)}:${format(secs)}`;

      ipc.send("start-tracking");

    },1000);


  }else{

    tracking = false;
    btn.innerText = "Start";
    ipc.send("stop-tracking");
    clearInterval(timer);

  }

}

function endWork(){

  tracking = false;

  clearInterval(timer);

  ipc.send("end-session");

  alert("Logged out");
}


ipc.on("status-update",(event,status)=>{

const statusEl = document.getElementById("status");

statusEl.innerText = "Status: " + status.toUpperCase();

if(status === "active"){
  statusEl.style.color = "#4caf50";
}else{
  statusEl.style.color = "#f44336";
}

});

ipc.on("force-stop", ()=>{
  if(tracking){
    tracking = false;

    clearInterval(timer);

    document.getElementById("toggleBtn").innerText = "Start";

    alert("Stopped due to inactivity");
  }
});

ipc.on("app-update",(event,data)=>{
  document.getElementById("app").innerText =
  "App: " + data.app + " | " + data.title;
});

function updateTimerDisplay(){
  let hrs = Math.floor(seconds/3600);
  let mins = Math.floor((seconds%3600)/60);
  let secs = seconds%60;

  document.getElementById("timer").innerText =
  `${format(hrs)}:${format(mins)}:${format(secs)}`;
}

ipc.on("user-data",(event,data)=>{

  const today = new Date().toDateString();

  const savedDateKey = "date_" + data.userId;
  const savedDate = localStorage.getItem(savedDateKey);

  userKey = "seconds_" + data.userId;

  // 👉 CHECK IF NEW DAY
  if(savedDate !== today){
    seconds = 0;
    localStorage.setItem(userKey, 0);
    localStorage.setItem(savedDateKey, today);
  }else{
    seconds = parseInt(localStorage.getItem(userKey)) || 0;
  }

  document.getElementById("user").innerText =
  "User: " + data.userId;

  updateTimerDisplay();
});

</script>
</div>
</body>

</html>
