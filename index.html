<!DOCTYPE html>
<html>

<head>
<title>Work Tracker</title>

<style>

html, body{
  height:100%;
  margin:0;
  overflow:hidden;
}

body{
  font-family: 'Segoe UI', Arial;
  background:#f4f6f9;
  display:flex;
  justify-content:center;
  align-items:center;
}

.container{
  background:white;
  padding:30px;
  border-radius:16px;
  width:380px;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
  text-align:center;
}

h1{
  margin-bottom:10px;
}

.info{
  margin:6px 0;
  font-size:14px;
  color:#666;
}

#timer{
  font-size:42px;
  margin:20px 0;
  font-weight:bold;
  letter-spacing:2px;
}

.bar{
  width:100%;
  height:18px;
  background:#eee;
  border-radius:20px;
  overflow:hidden;
  margin-bottom:15px;
}

.fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#4caf50,#81c784);
  transition: width 0.5s ease;
}

button{
  padding:12px 15px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  transition:0.2s;
}

button:hover{
  transform:scale(1.05);
}

button:active{
  transform:scale(0.85);
}

.start{ background:#4caf50; color:white; }
.pause{ background:#ff9800; color:white; }
.end{ background:#f44336; color:white; }
.logout{ background:#555; color:white; }

</style>

</head>

<body>
    <div class="container">

<h1>Work Tracker</h1>
<div style="display:flex; align-items:center; gap:10px; justify-content:center; margin-bottom:10px;">
  <img id="avatar" 
       src="https://ui-avatars.com/api/?name=User&background=4caf50&color=fff"
       style="width:50px; height:50px; border-radius:50%; border:2px solid #4caf50;" />
  <div style="text-align:left;">
    <div id="userName" style="font-weight:bold;">-</div>
    <div id="userEmail" style="font-size:12px; color:#666;">-</div>
  </div>
</div>
<div id="status" class="info">Status: ACTIVE</div>
<div id="timer">00:00:00</div>
<div id="app" class="info">App: -</div>
<button id="toggleBtn" class="start" onclick="toggleWork()">Start</button>
<button class="logout" onclick="endWork()">Logout</button>

<div id="idleModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; justify-content:center; align-items:center;">
  <div style="background:#fff; padding:30px; border-radius:10px; text-align:center;">
    <h2>⚠️ Tracker Paused</h2>
    <p>You are idle. Tracking paused.</p>
    <button onclick="resumeTracking()">OK</button>
  </div>
</div>

<script>
const ipc = window.api;
let currentUser = null;
let userKey = null;
let tracking = null;
let seconds = 0;

// ✅ FIX: I-restore ang timer display kapag nag-open/login
ipc.on("session-data", (event, data) => {
  if(data.total && data.total > 0){
    seconds = data.total;
    updateTimerDisplay();
  }
});

ipc.on("timer-update", (event, secs)=>{
  seconds = secs;

  let hrs = Math.floor(seconds/3600);
  let mins = Math.floor((seconds%3600)/60);
  let secs2 = seconds%60;

  document.getElementById("timer").innerText =
  `${format(hrs)}:${format(mins)}:${format(secs2)}`;
});

function format(n){
  return n.toString().padStart(2,"0");
}

function toggleWork(){

  const btn = document.getElementById("toggleBtn");

  if(btn.innerText === "Start"){
    ipc.send("start-tracking");
  }else{
    ipc.send("stop-tracking");
  }

}

function endWork(){
  if(!confirm("Are you sure you want to logout?")) return;
  tracking = false;
  ipc.send("logout");
}


ipc.on("status-update",(event,status)=>{

  const statusEl = document.getElementById("status");
  const btn = document.getElementById("toggleBtn");

  statusEl.innerText = "Status: " + status.toUpperCase();

  if(status === "active"){

    statusEl.style.color = "#4caf50";

    btn.innerText = "Pause";
    tracking = true;


  }else{

    statusEl.style.color = "#f44336";

    tracking = false;
    btn.innerText = "Start";
  }

});

ipc.on("force-stop", ()=>{

  tracking = false;

  const btn = document.getElementById("toggleBtn");
  btn.innerText = "Start";

});

ipc.on("app-update",(event,data)=>{
  document.getElementById("app").innerText =
  "App: " + data.app + " | " + data.title;
});

function updateTimerDisplay(){
  let hrs = Math.floor(seconds/3600);
  let mins = Math.floor((seconds%3600)/60);
  let secs = seconds%60;

  document.getElementById("timer").innerText =
  `${format(hrs)}:${format(mins)}:${format(secs)}`;
}

ipc.on("user-data",(event,data)=>{

userKey = null; 

// detect kung email yung name
const isEmail = data.name && data.name.includes("@");

// 👉 display name (before @)
const displayName = isEmail
  ? data.name.split("@")[0]
  : data.name;

document.getElementById("userName").innerText =
  displayName || "User";

// 👉 email
document.getElementById("userEmail").innerText =
  data.email || data.name || "No email";

  // ✅ AVATAR (AUTO PLACEHOLDER IF NO IMAGE)
  const avatar = document.getElementById("avatar");

  if(data.avatar){
    avatar.src = data.avatar;
  }else{
    // fallback avatar (auto generate)
    avatar.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(data.name || "User")}&background=4caf50&color=fff`;
  }

  updateTimerDisplay();
});

window.api.receive("idle-popup", ()=>{
  document.getElementById("idleModal").style.display = "flex";
});

window.api.receive("resume-tracking", ()=>{

  document.getElementById("idleModal").style.display = "none";

  console.log("🔥 RESUME TRACKING TRIGGERED");
  tracking = true;

  const btn = document.getElementById("toggleBtn");
  btn.innerText = "Pause";

});

function resumeTracking(){

  tracking = true;

  const btn = document.getElementById("toggleBtn");
  btn.innerText = "Pause";



  window.api.send("start-tracking");

  document.getElementById("idleModal").style.display = "none";
}

let lastSent = 0;

window.addEventListener("mousemove", ()=>{
  const now = Date.now();
console.log("🖱️ Mouse move detected");
  if(now - lastSent > 500){ // limit spam
    window.api.send("user-activity");
    window.api.send("increment-activity");
    lastSent = now;
  }
});

window.addEventListener("keydown", ()=>{
  window.api.send("user-activity");
  window.api.send("increment-activity");
});

window.api.receive("trigger-screenshot", ()=>{
  console.log("📡 Trigger received from main");
  window.api.send("trigger-screenshot");
});

</script>
</div>
</body>

</html>
